# Home Assistant 超级主页设计

views:
  # ==================== 首页 ====================
  - title: 🏠 我的家
    path: home
    icon: mdi:home
    theme: Backend-selected
    badges: []
    cards:
      # 顶部欢迎卡片
      - type: markdown
        content: |
          # 欢迎回家，阿简！👋
          当前位置：**广东潮州枫溪**
          上次更新：{{ now().strftime('%Y-%m-%d %H:%M') }}
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              padding: 20px;
              border-radius: 15px;
            }
            h1 { font-size: 2em; margin-bottom: 10px; }
      
      # 天气 + 时间
      - type: horizontal-stack
        cards:
          - type: weather-forecast
            entity: weather.openweathermap
            forecast_type: daily
          - type: entity
            entity: sensor.date
          - type: entity
            entity: sensor.time
          
      # 快速控制
      - type: vertical-stack
        title: ⚡ 快速控制
        cards:
          - type: entities
            entities:
              - entity: light.yeelink_mono5_daa1_light
                name: 💡 客厅灯
              - entity: light.yeelink_lamp9_902f_light
                name: 📖 台灯
              - entity: switch.smart_plug
                name: 🔌 智能插座
          - type: buttons
            entities:
              - entity: scene.home_mode
                name: 🏠 回家
              - entity: scene.away_mode
                name: 🚶 离家
              - entity: scene.night_mode
                name: 🌙 睡眠
          
      # 环境监测
      - type: vertical-stack
        title: 🌡️ 环境监测
        cards:
          - type: gauge
            entity: sensor.temperature
            min: 0
            max: 40
            needle: true
          - type: gauge
            entity: sensor.humidity
            min: 0
            max: 100
            needle: true
          - type: entities
            entities:
              - entity: sensor.pm25
                name: 🌫️ PM2.5
              - entity: sensor.co2
                name: 💨 CO2
              - entity: sensor.air_quality_index
                name: 📊 空气质量
          
      # 安防监控
      - type: vertical-stack
        title: 📹 安防监控
        cards:
          - type: picture-entity
            entity: camera.xiaomi_c500_pro
            camera_view: live
          - type: picture-entity
            entity: camera.xiaomi_cw400
            camera_view: live
          - type: entities
            entities:
              - entity: binary_sensor.door_window
                name: 🚪 门窗状态
              - entity: binary_sensor.motion_sensor
                name: 🏃 人体感应
              - entity: alarm_control_panel.home_alarm
                name: 🔐 报警系统
          
      # 媒体播放
      - type: media-control
        entity: media_player.living_room_speaker
      
      # 能源监控
      - type: energy-date-selection
      - type: energy-usage-graph
      - type: energy-solar-graph
      
      # 快捷场景
      - type: grid
        cards:
          - type: button
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.movie_mode
            icon: mdi:movie
            name: 🎬 电影模式
          - type: button
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.reading_mode
            icon: mdi:book-open-page-variant
            name: 📚 阅读模式
          - type: button
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.party_mode
            icon: mdi:party-popper
            name: 🎉 派对模式
          - type: button
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.romantic_mode
            icon: mdi:heart
            name: 💕 浪漫模式

  # ==================== 卧室 ====================
  - title: 🛏️ 卧室
    path: bedroom
    icon: mdi:bed
    cards:
      - type: entities
        title: 卧室灯光
        entities:
          - entity: light.esphome_web_74ee3c_neopixel_light
            name: 全彩灯带
          - entity: light.bedside_lamp
            name: 床头灯
      - type: thermostat
        entity: climate.bedroom_ac
      - type: entities
        title: 卧室传感器
        entities:
          - entity: sensor.bedroom_temperature
          - entity: sensor.bedroom_humidity
          - entity: sensor.bedroom_light
      - type: cover
        entity: cover.bedroom_curtain

  # ==================== 客厅 ====================
  - title: 🛋️ 客厅
    path: living_room
    icon: mdi:sofa
    cards:
      - type: entities
        title: 客厅灯光
        entities:
          - entity: light.yeelink_mono5_a4e3_light
          - entity: light.yeelink_cta_6596_light
      - type: media-control
        entity: media_player.tv
      - type: thermostat
        entity: climate.living_room_ac
      - type: entities
        title: 客厅环境
        entities:
          - entity: sensor.living_room_temperature
          - entity: sensor.living_room_humidity
          - entity: sensor.living_room_pm25

  # ==================== 安防 ====================
  - title: 🛡️ 安防
    path: security
    icon: mdi:shield-home
    cards:
      - type: picture-entity
        entity: camera.xiaomi_c500_pro
        camera_view: live
      - type: picture-entity
        entity: camera.xiaomi_cw400
        camera_view: live
      - type: alarm-panel
        entity: alarm_control_panel.home_alarm
      - type: entities
        title: 传感器状态
        entities:
          - entity: binary_sensor.front_door
            name: 前门
          - entity: binary_sensor.back_door
            name: 后门
          - entity: binary_sensor.window_living
            name: 客厅窗
          - entity: binary_sensor.window_bedroom
            name: 卧室窗
          - entity: binary_sensor.motion_entrance
            name: 入口感应
          - entity: binary_sensor.motion_hallway
            name: 走廊感应

  # ==================== 能源 ====================
  - title: ⚡ 能源
    path: energy
    icon: mdi:lightning-bolt
    cards:
      - type: energy-usage-graph
      - type: energy-solar-graph
      - type: energy-devices-graph
      - type: entities
        title: 实时功率
        entities:
          - entity: sensor.home_power_consumption
            name: 总功率
          - entity: sensor.ac_power
            name: 空调功率
          - entity: sensor.lighting_power
            name: 照明功率

  # ==================== 设置 ====================
  - title: ⚙️ 设置
    path: settings
    icon: mdi:cog
    cards:
      - type: entities
        title: 系统信息
        entities:
          - entity: sensor.ha_version
          - entity: sensor.uptime
          - entity: sensor.cpu_usage
          - entity: sensor.memory_usage
      - type: button
        name: 🔧 开发者工具
        tap_action:
          action: navigate
          navigation_path: /developer-tools
      - type: button
        name: 📊 日志
        tap_action:
          action: navigate
          navigation_path: /config/logs
      - type: button
        name: 🔄 备份
        tap_action:
          action: navigate
          navigation_path: /config/backups
