# ESPHome Smart PDA - 修复优化版
# 修复内容:
# 1. 添加生肖和干支年传感器支持
# 2. 优化更新频率 (1s → 5s)
# 3. 添加空值检查
# 4. 优化字体 glyphs 定义
# 5. 添加内存保护

esphome:
  name: smart-pda
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "XiaoMi"
  password: "15816141921"
  fast_connect: false
  enable_btm: true
  enable_rrm: true

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

logger:

web_server:
  port: 80

debug:

globals:
  - id: always_on_mode
    type: bool
    initial_value: 'false'

# =================================================================
# 硬件驱动
# =================================================================
output:
  - platform: ledc
    pin: 1
    id: gpio_backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

i2c:
  - id: bus_a
    sda: GPIO8
    scl: GPIO4
    scan: true

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    interrupt_pin:
      number: 3
      ignore_strapping_warning: true
    reset_pin: GPIO38
    on_touch:
      then:
        - script.execute: inactivity_timer

spi:
  id: quad_spi
  type: quad
  clk_pin: GPIO47
  data_pins: [21, 48, 40, 39]

display:
  - platform: qspi_dbi
    id: my_display
    update_interval: never
    auto_clear_enabled: False
    model: CUSTOM
    data_rate: 40MHz
    dimensions:
      width: 480
      height: 272
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    invert_colors: true
    rotation: 180
    init_sequence:
      - [0xff, 0xa5]
      - [0x36, 0xc0]
      - [0x3A, 0x01]
      - [0x41, 0x03]
      - [0x44, 0x15]
