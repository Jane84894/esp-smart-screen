    glyphs: ["\U000F048B", "\U000F0496", "\U000F02DC", "\U000F01B4", "\U000F02FC", "\U000F0120"] 

time:
  - platform: sntp
    id: sntp_time
    timezone: "CST-8"
    servers: ["ntp.aliyun.com", "ntp.tencent.com"]

# =================================================================
# 动态更新 - 优化：降低更新频率到 5 秒
# =================================================================
interval:
  - interval: 5s
    then:
      - lambda: |-
          // 1. 息屏与常亮管理逻辑
          uint32_t inactive_time = lv_disp_get_inactive_time(lv_disp_get_default());
          uint32_t timeout = id(sleep_time).state * 1000;
          if (!id(always_on_mode) && inactive_time > timeout) {
            if (id(display_backlight).current_values.is_on()) id(display_backlight).turn_off().perform();
          } else {
            if (!id(display_backlight).current_values.is_on()) id(display_backlight).turn_on().perform();
          }
          // 2. 主页面时间/日期字符串刷新
          auto time = id(sntp_time).now();
          if (time.is_valid() && id(time_label) != nullptr) {
            char t_str[16];
            sprintf(t_str, "%02d:%02d", time.hour, time.minute);
            lv_label_set_text(id(time_label), t_str);
            char date_str[64];
            const char* wdays[] = {"星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"};
            sprintf(date_str, "%02d月%02d日 %s", time.month, time.day_of_month, wdays[time.day_of_week - 1]);
            lv_label_set_text(id(date_label), date_str);
          }
          // 3. 农历文本拼接显示 - 修复：添加空值检查
          if (id(lunar_label) != nullptr) {
            std::string lunar_str = "农历 --";
            if (id(ha_lunar_date_state).has_state() && !id(ha_lunar_date_state).state.empty()) {
              lunar_str = "农历 " + id(ha_lunar_date_state).state;
            }
            lv_label_set_text(id(lunar_label), lunar_str.c_str());
          }
          // 4. 虚拟机指示灯组动态变色逻辑
          if (id(icon_100) != nullptr) {
            auto update_vm = [](esphome::binary_sensor::BinarySensor *sensor, lv_obj_t *icon_lbl, lv_obj_t *name_lbl) {
              if (sensor->has_state()) {
                bool running = sensor->state;
                lv_obj_set_style_text_color(icon_lbl, running ? lv_color_hex(0x00E676) : lv_color_hex(0x424242), 0);
                lv_obj_set_style_text_color(name_lbl, running ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x757575), 0);
              }
            };
            update_vm(id(vm_100_ikuai), id(icon_100), id(name_100));
            update_vm(id(vm_101_openwrt), id(icon_101), id(name_101));
            update_vm(id(vm_102_ad), id(icon_102), id(name_102));
            update_vm(id(vm_103_jike), id(icon_103), id(name_103));
            update_vm(id(vm_104_ubuntu), id(icon_104), id(name_104));
            update_vm(id(vm_105_synology), id(icon_105), id(name_105));
            update_vm(id(vm_106_ha), id(icon_106), id(name_106));
            update_vm(id(vm_107_win11), id(icon_107), id(name_107));
            update_vm(id(vm_108_hack), id(icon_108), id(name_108));
            update_vm(id(vm_109_ct109), id(icon_109), id(name_109));
            update_vm(id(vm_110_openclaw), id(icon_110), id(name_110));
            update_vm(id(vm_200_grafana), id(icon_200), id(name_200));
          }

