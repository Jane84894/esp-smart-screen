# ESPHome Smart PDA - 修复优化版
# 修复内容:
# 1. 添加生肖和干支年传感器支持
# 2. 优化更新频率 (1s → 5s)
# 3. 添加空值检查
# 4. 优化字体 glyphs 定义
# 5. 添加内存保护

esphome:
  name: smart-pda
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "XiaoMi"
  password: "15816141921"
  fast_connect: false
  enable_btm: true
  enable_rrm: true

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

logger:

web_server:
  port: 80

debug:

globals:
  - id: always_on_mode
    type: bool
    initial_value: 'false'
