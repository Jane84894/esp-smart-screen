script:
  - id: inactivity_timer
    mode: restart
    then:
      - if:
          condition:
            light.is_off: display_backlight
          then:
            - light.turn_on: display_backlight
      - delay: !lambda 'return id(sleep_time).state * 1000;'
      - if:
          condition:
            lambda: 'return !id(always_on_mode);'
          then:
            - light.turn_off: display_backlight

number:
  - platform: template
    name: "Sleep time"
    id: sleep_time
    optimistic: true
    initial_value: 15
    restore_value: yes
    unit_of_measurement: "s"
    min_value: 5
    max_value: 600
    step: 1

button:
  - platform: restart
    id: sys_restart
    name: "System Restart"

# =================================================================
# 传感器
# =================================================================
binary_sensor:
  - platform: status
    name: "HA Connected"
    id: ha_connected
    on_state:
      then:
        - lambda: |-
            if (id(ha_icon) != nullptr) {
              lv_obj_set_style_text_color(id(ha_icon), x ? lv_color_hex(0x00E676) : lv_color_hex(0xFF5252), 0);
            }
  - platform: homeassistant
    id: vm_100_ikuai
    entity_id: binary_sensor.ikuai_status
  - platform: homeassistant
    id: vm_101_openwrt
    entity_id: binary_sensor.openwrt_status
  - platform: homeassistant
    id: vm_102_ad
    entity_id: binary_sensor.ad_status
  - platform: homeassistant
    id: vm_103_jike
    entity_id: binary_sensor.jike_status
  - platform: homeassistant
    id: vm_104_ubuntu
    entity_id: binary_sensor.ubuntu_server_status
  - platform: homeassistant
    id: vm_105_synology
    entity_id: binary_sensor.synology_status
  - platform: homeassistant
    id: vm_106_ha
    entity_id: binary_sensor.ha_status
  - platform: homeassistant
    id: vm_107_win11
    entity_id: binary_sensor.win11_status
  - platform: homeassistant
    id: vm_108_hack
    entity_id: binary_sensor.hack_big_sur_status
  - platform: homeassistant
    id: vm_109_ct109
    entity_id: binary_sensor.ct109_status
  - platform: homeassistant
    id: vm_110_openclaw
    entity_id: binary_sensor.openclaw_status
  - platform: homeassistant
    id: vm_200_grafana
    entity_id: binary_sensor.monitor_grafana_status

sensor:
  - platform: uptime
    name: "System Uptime"
    id: sys_uptime
    on_value:
      then:
        - lambda: |-
            if (id(sys_uptime_lbl) != nullptr) {
              int days = x / 86400;
              int hours = ((int)x % 86400) / 3600;
              int mins = ((int)x % 3600) / 60;
              lv_label_set_text(id(sys_uptime_lbl), str_sprintf("已运行：%d天 %d时 %d分", days, hours, mins).c_str());
            }

  - platform: debug
    free: 
      name: "Free Heap Memory"
      id: sys_free_heap
      on_value:
        then:
          - lambda: |-
              if (id(sys_ram_lbl) != nullptr && id(sys_free_heap).has_state()) {
                float mem_kb = id(sys_free_heap).state / 1024.0;
                if (mem_kb > 0) {
                  lv_label_set_text(id(sys_ram_lbl), str_sprintf("可用内存：%.1f KB", mem_kb).c_str());
                } else {
                  lv_label_set_text(id(sys_ram_lbl), "可用内存：-- KB");
                }
              }

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_sig
    on_value:
      then:
        - lambda: |-
            if (id(wifi_icon) != nullptr) {
              if (x > -55) lv_label_set_text(id(wifi_icon), "\U000F05A9");
              else if (x > -70) lv_label_set_text(id(wifi_icon), "\U000F05A8");
              else if (x > -85) lv_label_set_text(id(wifi_icon), "\U000F05A7");
              else lv_label_set_text(id(wifi_icon), "\U000F05A6");
            }
            if (id(sys_wifi_lbl) != nullptr) {
              lv_label_set_text(id(sys_wifi_lbl), str_sprintf("信号：%.0f dBm", x).c_str());
            }

  # 天气
  - platform: homeassistant
    id: ha_temp
    entity_id: sensor.openweathermap_temperature
    on_value:
      then:
        - lambda: 'if (id(temp_label) != nullptr) lv_label_set_text(id(temp_label), str_sprintf("%.1f°C", x).c_str());'
  - platform: homeassistant
    id: ha_humidity
    entity_id: sensor.openweathermap_humidity
    on_value:
      then:
        - lambda: 'if (id(hum_label) != nullptr) lv_label_set_text(id(hum_label), str_sprintf("%.0f%%", x).c_str());'
  - platform: homeassistant
    id: ha_wind
    entity_id: sensor.openweathermap_wind_speed
    on_value:
      then:
        - lambda: 'if (id(wind_label) != nullptr) lv_label_set_text(id(wind_label), str_sprintf("%.1f m/s", x).c_str());'
  - platform: homeassistant
    id: ha_feels_like
    entity_id: sensor.openweathermap_apparent_temperature 
    on_value:
      then:
        - lambda: 'if (id(feels_label) != nullptr) lv_label_set_text(id(feels_label), str_sprintf("体感 %.1f°C", x).c_str());'

  # 农历 - 修复：添加生肖和干支年
  - platform: homeassistant
    id: ha_lunar_day_num
    entity_id: sensor.nong_li_ri_qi_2

  - platform: homeassistant
    id: ha_sheng_xiao
    entity_id: sensor.sheng_xiao
    on_value:
      then:
        - lambda: |-
            if (id(zodiac_label) != nullptr && id(ha_sheng_xiao).has_state() && !id(ha_sheng_xiao).state.empty()) {
              lv_label_set_text(id(zodiac_label), ("🐴 " + id(ha_sheng_xiao).state).c_str());
            }

  - platform: homeassistant
    id: ha_gan_zhi_nian
    entity_id: sensor.gan_zhi_nian
    on_value:
      then:
        - lambda: |-
            if (id(festival_label) != nullptr && id(ha_gan_zhi_nian).has_state() && !id(ha_gan_zhi_nian).state.empty()) {
              lv_label_set_text(id(festival_label), id(ha_gan_zhi_nian).state.c_str());
            }

  # PVE
  - platform: homeassistant
    id: ha_pve_max_cpu
    entity_id: sensor.pve_max_cpu
  - platform: homeassistant
    id: ha_pve_cpu
    entity_id: sensor.pve_cpu_usage
    on_value:
      then:
        - lambda: |-
            if (id(pve_cpu_arc) != nullptr && id(ha_pve_max_cpu).has_state()) {
              float max = id(ha_pve_max_cpu).state;
              if (max > 0) {
                int pct = (int)((x / max) * 100.0);
                lv_arc_set_value(id(pve_cpu_arc), pct);
                lv_label_set_text(id(pve_cpu_val), str_sprintf("%d%%", pct).c_str());
              }
            }
  - platform: homeassistant
    id: ha_pve_max_ram
    entity_id: sensor.pve_max_memory_usage
  - platform: homeassistant
    id: ha_pve_ram
    entity_id: sensor.pve_memory_usage
    on_value:
      then:
        - lambda: |-
            if (id(pve_ram_arc) != nullptr && id(ha_pve_max_ram).has_state()) {
              float max = id(ha_pve_max_ram).state;
              if (max > 0) {
                int pct = (int)((x / max) * 100.0);
                lv_arc_set_value(id(pve_ram_arc), pct);
                lv_label_set_text(id(pve_ram_val), str_sprintf("%d%%", pct).c_str());
              }
            }
  - platform: homeassistant
    id: ha_pve_max_disk
    entity_id: sensor.pve_max_disk_usage
  - platform: homeassistant
    id: ha_pve_disk
    entity_id: sensor.pve_disk_usage
    on_value:
      then:
        - lambda: |-
            if (id(pve_disk_arc) != nullptr && id(ha_pve_max_disk).has_state()) {
              float max = id(ha_pve_max_disk).state;
              if (max > 0) {
                int pct = (int)((x / max) * 100.0);
                lv_arc_set_value(id(pve_disk_arc), pct);
                lv_label_set_text(id(pve_disk_val), str_sprintf("%d%%", pct).c_str());
              }
            }

  # 路由器
  - platform: homeassistant
    id: clash_up
    entity_id: sensor.clash_shi_li_upload_speed
    on_value:
      then:
        - lambda: 'if (id(clash_up_lbl) != nullptr) lv_label_set_text(id(clash_up_lbl), str_sprintf("上传：%.1f MB/s", x).c_str());'
  - platform: homeassistant
    id: clash_down
    entity_id: sensor.clash_shi_li_download_speed
    on_value:
      then:
        - lambda: 'if (id(clash_down_lbl) != nullptr) lv_label_set_text(id(clash_down_lbl), str_sprintf("下载：%.1f MB/s", x).c_str());'
  - platform: homeassistant
    id: clash_conn
    entity_id: sensor.clash_shi_li_connection_number
    on_value:
      then:
        - lambda: 'if (id(clash_conn_lbl) != nullptr) lv_label_set_text(id(clash_conn_lbl), str_sprintf("连接数：%.0f", x).c_str());'
  - platform: homeassistant
    id: ikuai_up
    entity_id: sensor.ikuai_upload
    on_value:
      then:
        - lambda: 'if (id(ikuai_up_lbl) != nullptr) lv_label_set_text(id(ikuai_up_lbl), str_sprintf("上传：%.1f MB/s", x).c_str());'
  - platform: homeassistant
    id: ikuai_down
    entity_id: sensor.ikuai_download
    on_value:
      then:
        - lambda: 'if (id(ikuai_down_lbl) != nullptr) lv_label_set_text(id(ikuai_down_lbl), str_sprintf("下载：%.1f MB/s", x).c_str());'
  - platform: homeassistant
    id: ikuai_online
    entity_id: sensor.ikuai_online_user
    on_value:
      then:
        - lambda: 'if (id(ikuai_online_lbl) != nullptr) lv_label_set_text(id(ikuai_online_lbl), str_sprintf("在线：%.0f 设备", x).c_str());'
  - platform: homeassistant
    id: adguard_blocked
    entity_id: sensor.adguard_home_dns_queries_blocked
    on_value:
      then:
        - lambda: 'if (id(adguard_blocked_lbl) != nullptr) lv_label_set_text(id(adguard_blocked_lbl), str_sprintf("已拦截：%.0f", x).c_str());'
  - platform: homeassistant
    id: adguard_ratio
    entity_id: sensor.adguard_home_dns_queries_blocked_ratio
    on_value:
      then:
        - lambda: 'if (id(adguard_ratio_lbl) != nullptr) lv_label_set_text(id(adguard_ratio_lbl), str_sprintf("拦截率：%.2f%%", x).c_str());'
  - platform: homeassistant
    id: adguard_speed
    entity_id: sensor.adguard_home_average_processing_speed
    on_value:
      then:
        - lambda: 'if (id(adguard_speed_lbl) != nullptr) lv_label_set_text(id(adguard_speed_lbl), str_sprintf("耗时：%.2f ms", x).c_str());'

text_sensor:
  - platform: wifi_info
    ip_address:
      id: device_ip
      on_value:
        then:
          - lambda: |-
              if (id(ip_label) != nullptr) lv_label_set_text(id(ip_label), x.c_str());
              if (id(sys_ip_lbl) != nullptr) lv_label_set_text(id(sys_ip_lbl), ("IP: " + x).c_str());
    mac_address:
      id: device_mac
      on_value:
        then:
          - lambda: 'if (id(sys_mac_lbl) != nullptr) lv_label_set_text(id(sys_mac_lbl), ("MAC: " + x).c_str());'

  - platform: homeassistant
    id: ha_weather_condition
    entity_id: sensor.openweathermap_weather
    on_value:
      then:
        - lambda: |-
            if (id(weather_icon) != nullptr && id(weather_cond) != nullptr) {
              std::string state = x;
              std::string icon = "\U000F0590";
              std::string cond = state; 
              if (state == "sunny" || state == "clear-night" || state == "晴") { icon = "\U000F0599"; cond = "晴"; }
              else if (state == "cloudy" || state == "阴") { icon = "\U000F0590"; cond = "阴"; }
              else if (state == "partlycloudy" || state == "多云") { icon = "\U000F0594"; cond = "多云"; }
              else if (state == "rainy" || state == "雨") { icon = "\U000F0596"; cond = "雨"; }
              else if (state == "snowy" || state == "雪") { icon = "\U000F0597"; cond = "雪"; }
              else if (state == "windy" || state == "风") { icon = "\U000F0598"; cond = "大风"; }
              lv_label_set_text(id(weather_icon), icon.c_str());
              lv_label_set_text(id(weather_cond), cond.c_str());
            }

  - platform: homeassistant
    id: ha_lunar_date_state
    entity_id: sensor.nong_li_ri_qi 

  - platform: homeassistant
    id: ha_pve_status_text
    entity_id: sensor.pve_status

