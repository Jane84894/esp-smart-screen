                - label: { text: "\U000F004D", align: LEFT_MID, x: 10, text_font: font_mdi_small, text_color: 0xB0BEC5 }
                - label: { text: "返回", align: LEFT_MID, x: 30, text_font: font_small, text_color: 0xB0BEC5 }
          - label: { text: "系统状态", align: TOP_MID, y: 16, text_font: font_small, text_color: 0xE0E0E0 }
          
          - obj:
              align: TOP_LEFT
              x: 20
              y: 60
              width: 210
              height: 190
              bg_color: 0x1A1A1A
              radius: 16
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label: { text: "网络信息", align: TOP_MID, y: 15, width: 100%, text_align: CENTER, text_font: font_small, text_color: 0x00E5FF }
                - obj: { width: 180, height: 1, align: TOP_MID, y: 45, bg_color: 0x2C2C2C, border_width: 0 }
                - label: { id: sys_ip_lbl, text: "IP: --", align: TOP_MID, y: 65, width: 100%, text_align: CENTER, text_font: font_small, text_color: 0xE0E0E0 }
                - label: { id: sys_mac_lbl, text: "MAC: --", align: TOP_MID, y: 105, width: 100%, text_align: CENTER, text_font: font_small, text_color: 0x9E9E9E }
                - label: { id: sys_wifi_lbl, text: "信号：-- dBm", align: TOP_MID, y: 145, width: 100%, text_align: CENTER, text_font: font_small, text_color: 0x00E676 }
          
          - obj:
              align: TOP_RIGHT
              x: -20
              y: 60
              width: 210
              height: 190
              bg_color: 0x1A1A1A
              radius: 16
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label: { text: "运行状态", align: TOP_MID, y: 15, width: 100%, text_align: CENTER, text_font: font_small, text_color: 0xFFCA28 }
                - obj: { width: 180, height: 1, align: TOP_MID, y: 45, bg_color: 0x2C2C2C, border_width: 0 }
                - label: { id: sys_uptime_lbl, text: "已运行：--", align: TOP_MID, y: 65, width: 100%, text_align: CENTER, text_font: font_small, text_color: 0xE0E0E0 }
                - label: { id: sys_ram_lbl, text: "可用内存：--", align: TOP_MID, y: 105, width: 100%, text_align: CENTER, text_font: font_small, text_color: 0x29B6F6 }

    # ------------------ 【设置页】 ------------------
    - obj:
        id: page_settings
        hidden: true
        width: 100%
        height: 100%
        bg_color: 0x000000
        border_width: 0
        scrollbar_mode: "OFF"
        scrollable: false 
        pad_all: 0
        widgets:
          - button:
              align: TOP_LEFT 
              x: 20 
              y: 10
              width: 90
              height: 35
              bg_color: 0x1A1A1A 
              radius: 12
              on_click:
                - lambda: |-
                    lv_obj_add_flag(id(page_settings), LV_OBJ_FLAG_HIDDEN);
                    lv_obj_clear_flag(id(page_menu), LV_OBJ_FLAG_HIDDEN);
              widgets:
                - label: { text: "\U000F004D", align: LEFT_MID, x: 10, text_font: font_mdi_small, text_color: 0xB0BEC5 }
                - label: { text: "返回", align: LEFT_MID, x: 30, text_font: font_small, text_color: 0xB0BEC5 }
          - label: { text: "系统设置", align: TOP_MID, y: 16, text_font: font_small, text_color: 0xE0E0E0 }
          
          - obj:
              align: TOP_MID
              y: 55
              width: 420
              height: 45
              bg_color: 0x1A1A1A
              radius: 12
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label: { text: "\U000F0599", align: LEFT_MID, x: 20, text_font: font_mdi_status, text_color: 0xFFEA00 }
                - label: { text: "屏幕亮度", align: LEFT_MID, x: 60, text_font: font_small, text_color: 0xFFFFFF }
                - slider:
                    id: slider_brightness
                    align: RIGHT_MID
                    x: -20
                    width: 220
                    height: 10
                    value: 100
                    on_value:
                      - lambda: |-
                          float brightness = (float)x / 100.0f;
                          auto call = id(display_backlight).turn_on();
                          call.set_brightness(brightness);
                          call.perform();
          
          - obj:
              align: TOP_MID
              y: 110
              width: 420
              height: 45
              bg_color: 0x1A1A1A
              radius: 12
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label: { text: "\U000F050F", align: LEFT_MID, x: 20, text_font: font_mdi_status, text_color: 0xFF9800 }
                - label: { text: "息屏时间", align: LEFT_MID, x: 60, text_font: font_small, text_color: 0xFFFFFF }
                - label: { id: sleep_time_lbl, text: "15 秒", align: RIGHT_MID, x: -250, text_font: font_small, text_color: 0x9E9E9E }
                - slider:
                    id: slider_sleep_time
                    align: RIGHT_MID
                    x: -20
                    width: 220
                    height: 10
                    min_value: 5
                    max_value: 120
                    value: 15
                    on_value:
                      - lambda: |-
                          id(sleep_time).publish_state(x);
                          lv_label_set_text(id(sleep_time_lbl), str_sprintf("%d 秒", (int)x).c_str());
          
          - obj:
              align: TOP_MID
              y: 165
              width: 420
              height: 45
              bg_color: 0x1A1A1A
              radius: 12
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label: { text: "\U000F0599", align: LEFT_MID, x: 20, text_font: font_mdi_status, text_color: 0x00E676 }
                - label: { text: "常亮模式", align: LEFT_MID, x: 60, text_font: font_small, text_color: 0xFFFFFF }
                - button:
                    id: btn_always_on
                    align: RIGHT_MID
                    x: -20
                    width: 60
                    height: 25
                    bg_color: 0x424242
                    radius: 12
                    on_click:
                      - lambda: |-
                          id(always_on_mode) = !id(always_on_mode);
                          if (id(always_on_mode)) {
                            lv_obj_set_style_bg_color(id(btn_always_on), lv_color_hex(0x00E676), 0);
                            lv_label_set_text(id(lbl_always_on_btn), "开");
                          } else {
                            lv_obj_set_style_bg_color(id(btn_always_on), lv_color_hex(0x424242), 0);
                            lv_label_set_text(id(lbl_always_on_btn), "关");
                          }
                    widgets:
                      - label: { id: lbl_always_on_btn, text: "关", align: CENTER, text_font: font_small, text_color: 0xFFFFFF }
          
          - button:
              align: TOP_LEFT
              x: 30
              y: 220
              width: 195
              height: 40
              bg_color: 0x1A1A1A
              radius: 12
              on_click:
                - light.turn_off: display_backlight
              widgets:
                - label: { text: "一键息屏", align: CENTER, text_font: font_small, text_color: 0x9E9E9E }
          
          - button:
              align: TOP_RIGHT
              x: -30
              y: 220
              width: 195
              height: 40
              bg_color: 0x3F1D1D 
              radius: 12
              on_click:
                - button.press: sys_restart
              widgets:
                - label: { text: "重启设备", align: CENTER, text_font: font_small, text_color: 0xFF5252 }
