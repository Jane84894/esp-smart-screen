# HA Dashboard 配置
# 位置：/config/dashboards/

views:
  # 首页 - 快速控制
  - title: 🏠 首页
    path: home
    cards:
      - type: entities
        title: 💡 常用灯光
        entities:
          - light.yeelink_mono5_daa1_light
          - light.yeelink_cta_6596_light
          - light.yeelink_lamp9_902f_light
      
      - type: thermostat
        entity: climate.ha_temperature
      
      - type: weather-forecast
        entity: weather.openweathermap

  # 卧室视图
  - title: 🛏️ 卧室
    path: bedroom
    cards:
      - type: entities
        title: 卧室设备
        entities:
          - light.esphome_web_74ee3c_neopixel_light
          - climate.bedroom_ac
          - sensor.bedroom_temperature
          - sensor.bedroom_humidity

  # 客厅视图
  - title: 🛋️ 客厅
    path: living_room
    cards:
      - type: entities
        title: 客厅设备
        entities:
          - light.yeelink_mono5_a4e3_light
          - media_player.tv
          - sensor.living_room_temperature

  # 安防监控
  - title: 📹 安防
    path: security
    cards:
      - type: picture-entity
        entity: camera.xiaomi_c500_pro
      - type: picture-entity
        entity: camera.xiaomi_cw400
      - type: entities
        title: 传感器
        entities:
          - binary_sensor.door_window
          - binary_sensor.motion

  # 设备管理
  - title: 🔧 设备管理
    path: devices
    cards:
      - type: entities
        title: 隐藏设备（已整理）
        entities:
          - update.* (32 个已隐藏)
          - *.indicator_light (27 个已隐藏)
