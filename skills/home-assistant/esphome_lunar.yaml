## 方案 4: 本地农历库 (完全离线)

使用 ESP32 本地计算农历，无需网络。

```yaml
esphome:
  name: lunar-offline
  includes:
    - lunar_calc.h  # 农历计算库

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

# 自定义农历传感器
sensor:
  - platform: custom
    lambda: |-
      auto lunar_sensor = new LunarSensor();
      App.register_component(lunar_sensor);
      return {lunar_sensor};
    
    sensors:
      - name: "农历月份"
      - name: "农历日期"

text_sensor:
  - platform: custom
    lambda: |-
      auto lunar_text = new LunarTextSensor();
      App.register_component(lunar_text);
      return {lunar_text};
    
    text_sensors:
      - name: "农历完整"

# 需要自定义组件文件
# lunar_calc.h 包含农历计算逻辑
```

