# ESPHome 农历传感器配置

## 方案 1: 通过 Home Assistant 模板传感器 (推荐) ⭐

最简单的方式，利用已有的 `sensor.lunar_date` 实体。

```yaml
# ESPHome 配置
esphome:
  name: my-device
  friendly_name: 我的设备

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

# 从 HA 获取农历数据
sensor:
  # 农历日期 (从 HA 模板传感器)
  - platform: homeassistant
    entity_id: sensor.lunar_date
    name: "农历日期"
    id: lunar_date
  
  # 农历月份
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: lunar_month
    name: "农历月份"
    id: lunar_month
  
  # 农历日期 (数字)
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: lunar_day
    name: "农历日"
    id: lunar_day
  
  # 生肖
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: zodiac
    name: "生肖"
    id: zodiac
  
  # 下一个传统节日
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: next_traditional
    name: "下一个传统节日"
    id: next_festival
  
  # 节日倒计时
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: next_traditional_days
    name: "节日倒计时"
    id: festival_countdown

# 在 OLED 显示屏上显示
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      it.printf(0, 0, id(font), "公历: %s", id(lunar_date).state.c_str());
      it.printf(0, 16, id(font), "农历：%s", id(lunar_date).state.c_str());
      it.printf(0, 32, id(font), "生肖：%s", id(zodiac).state.c_str());
      it.printf(0, 48, id(font), "距离%s: %d 天", 
                id(next_festival).state.c_str(), 
                (int)id(festival_countdown).state);

font:
  - file: "gfonts://Noto Sans SC"
    id: font
    size: 12
```

