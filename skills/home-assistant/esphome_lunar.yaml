## 方案 3: 自定义 API + 本地计算 (最佳) 🏆

在 HA 中创建专用 API 端点，ESP32 调用获取完整农历数据。

### 第一步：创建 HA 自动化 API

```yaml
# configuration.yaml
rest_command:
  get_lunar:
    url: "http://localhost:8123/api/states/sensor.lunar_date"
    method: "GET"
    headers:
      Authorization: "Bearer YOUR_LONG_LIVED_TOKEN"
```

### 第二步：ESPHome 配置

```yaml
esphome:
  name: lunar-clock
  friendly_name: 农历时钟

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:  # 热点备份
    ssid: "Lunar Display"
    password: "fallback123"

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  password: "ota_password"

# 从 HA 获取农历数据
sensor:
  # 农历月份 (1-12)
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: lunar_month
    name: "农历月"
    id: lunar_month_num
    on_value:
      then:
        - lambda: |-
            // 月份变化时更新显示
            id(display_component).update();
  
  # 农历日期 (1-30)
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: lunar_day
    name: "农历日"
    id: lunar_day_num
    on_value:
      then:
        - lambda: |-
            id(display_component).update();
  
  # 节日倒计时
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: next_traditional_days
    name: "节日倒计时"
    id: festival_days
    on_value:
      then:
        - lambda: |-
            id(display_component).update();

text_sensor:
  # 完整农历 (正月廿六)
  - platform: homeassistant
    entity_id: sensor.lunar_date
    name: "农历"
    id: lunar_text
    on_value:
      then:
        - lambda: |-
            id(display_component).update();
  
  # 生肖
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: zodiac
    name: "生肖"
    id: zodiac_text
    on_value:
      then:
        - lambda: |-
            id(display_component).update();
  
  # 下一个节日
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: next_traditional
    name: "下一个节日"
    id: next_festival_text
    on_value:
      then:
        - lambda: |-
            id(display_component).update();
  
  # 公历日期
  - platform: homeassistant
    entity_id: sensor.lunar_date
    attribute: gregorian_date
    name: "公历"
    id: gregorian_text
    on_value:
      then:
        - lambda: |-
            id(display_component).update();

# I2C OLED 显示屏
display:
  - platform: ssd1306_i2c
    id: display_component
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      // 清屏
      it.clear();
      
      // 公历
      it.printf(0, 0, id(font_small), "公历：%s", id(gregorian_text).state.c_str());
      
      // 农历 (大字)
      it.printf(0, 16, id(font_large), "%s", id(lunar_text).state.c_str());
      
      // 生肖
      it.printf(0, 36, id(font_small), "生肖：%s", id(zodiac_text).state.c_str());
      
      // 节日倒计时
      if (id(festival_days).state > 0) {
        it.printf(0, 50, id(font_small), "距离%s: %d 天", 
                  id(next_festival_text).state.c_str(), 
                  (int)id(festival_days).state);
      }

# 字体配置 (支持中文)
font:
  - file: "gfonts://Noto Sans SC"
    id: font_small
    size: 10
  - file: "gfonts://Noto Sans SC"
    id: font_large
    size: 16

# 按钮 (可选 - 切换显示)
button:
  - platform: template
    name: "刷新农历"
    on_press:
      then:
        - homeassistant.service:
            service: python_script.lunar_sensor
```

