## 方案 2: HTTP 请求直接获取 (离线方案)

不依赖 HA，ESP32 直接调用农历 API。

```yaml
esphome:
  name: lunar-display
  friendly_name: 农历显示屏

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

# HTTP 请求获取农历
sensor:
  - platform: http_request
    name: "农历月份"
    id: lunar_month
    url: "https://api.pearktrue.cn/api/lunar"
    json_path: "$.month"
    update_interval: 1h
  
  - platform: http_request
    name: "农历日期"
    id: lunar_day
    url: "https://api.pearktrue.cn/api/lunar"
    json_path: "$.day"
    update_interval: 1h
  
  - platform: http_request
    name: "农历年份"
    id: lunar_year
    url: "https://api.pearktrue.cn/api/lunar"
    json_path: "$.year"
    update_interval: 1h

text_sensor:
  - platform: http_request
    name: "农历完整"
    id: lunar_full
    url: "https://api.pearktrue.cn/api/lunar"
    json_path: "$.lmdate"
    update_interval: 1h
  
  - platform: http_request
    name: "生肖"
    id: zodiac
    url: "https://api.pearktrue.cn/api/lunar"
    json_path: "$.shengxiao"
    update_interval: 1h

http_request:
  useragent: "ESPHome Lunar Sensor"
  timeout: 5s

# 在显示屏上显示
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      it.printf(0, 0, id(font), "农历：%s", id(lunar_full).state.c_str());
      it.printf(0, 16, id(font), "生肖：%s", id(zodiac).state.c_str());

font:
  - file: "gfonts://Noto Sans SC"
    id: font
    size: 14
```

