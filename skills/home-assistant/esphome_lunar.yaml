## 🔧 故障排除

### 中文显示乱码
```yaml
# 确保使用支持中文的字体
font:
  - file: "gfonts://Noto Sans SC"  # 谷歌思源黑体
    id: font
    size: 14
```

### HA 实体无法访问
```yaml
# 检查 api 组件配置
api:
  encryption:
    key: !secret api_key  # 必须与 HA 一致
```

### 农历数据不更新
```yaml
# 添加定时刷新
interval:
  - interval: 1h
    then:
      - homeassistant.service:
          service: python_script.lunar_sensor
```
