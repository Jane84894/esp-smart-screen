# secrets.example.yaml
# 复制此文件为 secrets.yaml 并填入你的真实信息

# WiFi 配置
wifi_ssid: "你的 WiFi 名称"
wifi_password: "你的 WiFi 密码"

# Home Assistant API 加密密钥 (32 字节 Base64)
# 生成方法：python3 -c "import base64; print(base64.b64encode(__import__('os').urandom(32)).decode())"
api_key: "你的 API 密钥"

# OTA 更新密码
ota_password: "你的 OTA 密码"

# Home Assistant Token (用于 lunar_sensor.py)
ha_token: "你的 HA 长期访问令牌"

# Home Assistant URL
ha_url: "http://192.168.2.6:8123"
