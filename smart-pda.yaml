                lv_anim_set_exec_cb(&a, [](void * var, int32_t v) { lv_arc_set_value((lv_obj_t*)var, v); });
                lv_anim_set_values(&a, lv_arc_get_value(id(pve_cpu_arc)), pct); lv_anim_start(&a);
