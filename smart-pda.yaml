script:
  - id: inactivity_timer
    mode: restart
    then:
      - if:
          condition:
            light.is_off: display_backlight
          then:
            - light.turn_on: display_backlight
      - delay: !lambda 'return id(sleep_time).state * 1000;'
      - if:
          condition:
            lambda: 'return !id(always_on_mode);'
          then:
            - light.turn_off: display_backlight

number:
  - platform: template
    name: "Sleep time"
    id: sleep_time
    optimistic: true
    initial_value: 15
    restore_value: yes
    unit_of_measurement: "s"
    min_value: 5
    max_value: 600
    step: 1

button:
  - platform: restart
    id: sys_restart
    name: "System Restart"

