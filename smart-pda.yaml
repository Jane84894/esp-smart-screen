            }
  - platform: homeassistant
    id: vm_100_ikuai
    entity_id: binary_sensor.ikuai_status
  - platform: homeassistant
    id: vm_101_openwrt
    entity_id: binary_sensor.openwrt_status
  - platform: homeassistant
    id: vm_102_ad
    entity_id: binary_sensor.ad_status
  - platform: homeassistant
    id: vm_103_jike
    entity_id: binary_sensor.jike_status
  - platform: homeassistant
    id: vm_104_ubuntu
    entity_id: binary_sensor.ubuntu_server_status
  - platform: homeassistant
    id: vm_105_synology
    entity_id: binary_sensor.synology_status
  - platform: homeassistant
