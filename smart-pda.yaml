esphome:
  name: smart-pda
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    # 🌟 修复：彻底关闭 ESP-IDF 的 OTA 自动回滚防砖机制
    sdkconfig_options:
      CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE: "n"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "XiaoMi"
  password: "15816141921"
  fast_connect: false
  enable_btm: true
  enable_rrm: true

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

logger:

web_server:
  port: 80

# 🌟 开启全局 debug 组件，为系统内存传感器提供支持
debug:

# =================================================================
# 👇 全局逻辑变量 👇
# =================================================================
globals:
  - id: always_on_mode
    type: bool
    initial_value: 'false'

# =================================================================
# 👇 底层硬件驱动 👇
# =================================================================
output:
  - platform: ledc
    pin: 1
    id: gpio_backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

i2c:
  - id: bus_a
    sda: GPIO8
    scl: GPIO4
    scan: true

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    interrupt_pin:
      number: 3
      ignore_strapping_warning: true
    reset_pin: GPIO38
    on_touch:
      then:
        - script.execute: inactivity_timer

spi:
  id: quad_spi
  type: quad
  clk_pin: GPIO47
  data_pins: [21, 48, 40, 39]

display:
  - platform: qspi_dbi
    id: my_display
    update_interval: never
    auto_clear_enabled: False
    model: CUSTOM
    data_rate: 20MHz 
    dimensions:
      width: 480
      height: 272
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    invert_colors: true
    rotation: 180
    init_sequence:
      - [0xff, 0xa5]
