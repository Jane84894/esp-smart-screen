    id: vm_200_grafana
    entity_id: binary_sensor.monitor_grafana_status

sensor:
  - platform: uptime
    name: "System Uptime"
    id: sys_uptime
    on_value:
      then:
        - lambda: |-
            if (id(sys_uptime_lbl) != nullptr) {
              int days = x / 86400;
              int hours = ((int)x % 86400) / 3600;
              int mins = ((int)x % 3600) / 60;
              lv_label_set_text(id(sys_uptime_lbl), str_sprintf("%d天%d时%d分", days, hours, mins).c_str());
            }

  - platform: debug
    free: 
      name: "Free Heap Memory"
      id: sys_free_heap
      on_value:
        then:
          - lambda: |-
              if (id(sys_ram_lbl) != nullptr && id(sys_free_heap).has_state()) {
                float mem_kb = id(sys_free_heap).state / 1024.0;
                lv_label_set_text(id(sys_ram_lbl), str_sprintf("%.1f KB", mem_kb).c_str());
              }

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_sig
    on_value:
      then:
        - lambda: |-
            if (id(wifi_icon) != nullptr) {
              if (x > -55) lv_label_set_text(id(wifi_icon), "\U000F05A9");
              else if (x > -70) lv_label_set_text(id(wifi_icon), "\U000F05A8");
              else if (x > -85) lv_label_set_text(id(wifi_icon), "\U000F05A7");
              else lv_label_set_text(id(wifi_icon), "\U000F05A6");
            }
            if (id(sys_wifi_lbl) != nullptr) {
              lv_label_set_text(id(sys_wifi_lbl), str_sprintf("%.0f dBm", x).c_str());
            }

  - platform: homeassistant
    id: ha_temp
    entity_id: sensor.openweathermap_temperature
    on_value:
      then:
        - lambda: 'if (id(temp_label) != nullptr) lv_label_set_text(id(temp_label), str_sprintf("%.1f°C", x).c_str());'
  - platform: homeassistant
