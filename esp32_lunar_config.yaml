#         text: "距离春节：--天"
#         align: TOP_LEFT
#         x: 10
#         y: 160
#         text_font: FONT_CHINESE

# 4. 定时刷新（每小时更新一次）
interval:
  - interval: 60min
    then:
      - homeassistant.tagtime:

# 完整示例：在现有配置中添加
# 确保你的 HA 中已经安装了农历传感器集成
